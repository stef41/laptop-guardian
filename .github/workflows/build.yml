name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .
      - name: Build .app
        run: |
          pyinstaller --name "Laptop Guardian" \
            --windowed \
            --onedir \
            --noconfirm \
            --clean \
            --add-data "laptop_guardian:laptop_guardian" \
            laptop_guardian/app.py
      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -r "dist/Laptop Guardian.app" dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "Laptop Guardian" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "LaptopGuardian-mac.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: LaptopGuardian-mac.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .
      - name: Build .exe
        run: |
          pyinstaller --name "LaptopGuardian" `
            --windowed `
            --onefile `
            --noconfirm `
            --clean `
            --add-data "laptop_guardian;laptop_guardian" `
            laptop_guardian/app.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/LaptopGuardian.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libgirepository1.0-dev
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .
      - name: Build AppImage-style binary
        run: |
          pyinstaller --name "laptop-guardian" \
            --onefile \
            --noconfirm \
            --clean \
            --add-data "laptop_guardian:laptop_guardian" \
            laptop_guardian/app.py
          chmod +x dist/laptop-guardian
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/laptop-guardian

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmg/LaptopGuardian-mac.dmg
            artifacts/windows-exe/LaptopGuardian.exe
            artifacts/linux-binary/laptop-guardian
